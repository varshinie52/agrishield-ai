<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgriShield AI - Create Workspace Account</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="flex-center" style="min-height: 100vh; padding: 20px;">
        <div class="glass-card" style="width: 100%; max-width: 460px;">
            <h2 style="text-align: center; margin-bottom: 8px;">Initialize Account Profile</h2>
            <p style="text-align: center; color: var(--text-dim); font-size: 0.9rem; margin-bottom: 30px;">Provision workspace environmental configurations.</p>
            <form id="formSignupContainer">
                <div class="form-group"><label>Full User Name</label><input type="text" id="signupNameField" required placeholder="Varshini"></div>
                <div class="form-group"><label>Email Domain Identity</label><input type="email" id="signupEmailField" required placeholder="varshini@agrishield.ai"></div>
                <div class="form-group"><label>Operational Password</label><input type="password" id="signupPasswordField" required placeholder="••••••••"></div>
                <div class="form-group"><label>Verify Password Field</label><input type="password" id="signupConfirmField" required placeholder="••••••••"></div>
                <button type="submit" class="btn-neon" style="width: 100%; margin-top: 10px;">Deploy Registration Logs</button>
            </form>
            <p style="text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-mint);">Workspace verified profile active? <a href="login.html" style="color: var(--primary-neon); text-decoration: none; font-weight: 600;">Log In</a></p>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriShield AI - Logs Repository</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">AGRI<span>SHIELD</span></a>
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="analyzer.html">Analyzer</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="history.html">History</a></li>
            </ul>
            <div id="navbarAuthWrapper"></div>
        </div>
    </nav>

    <main style="max-width: 900px; margin: 0 auto; padding-top: 130px;">
        <div style="margin-bottom: 30px; padding-left: 10px;">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;">
                <span style="font-size:1.5rem;">🗂️</span>
                <h2 style="font-size: 1.5rem; font-weight: 600;">Workspace History Cache</h2>
            </div>
            <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: 4px; margin-left:38px;">All past classification records from your diagnostic scans.</p>
        </div>

        <!-- LOADING -->
        <div id="historyLoadingSpinner" class="loading-spinner-container" style="display:none;">
            <div class="loading-spinner"></div>
            <p style="color:var(--text-dim);margin-top:12px;font-size:0.9rem;">Loading scan records...</p>
        </div>

        <!-- ERROR -->
        <div id="historyErrorBox" class="glass-card" style="display:none;text-align:center;padding:35px;">
            <span style="font-size:2rem;display:block;margin-bottom:10px;">⚠️</span>
            <p id="historyErrorMsg" style="color:var(--danger-red);font-weight:500;"></p>
        </div>

        <!-- HISTORY CARDS -->
        <div id="historyInjectionTargetBox" style="display: flex; flex-direction: column; gap: 15px;">
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/historyPage.js"></script>
</body>
</html>
